[phases.setup]
nixPkgs = ["python311Full", "nodejs_20"]

[phases.build]
cmds = [
  "cd frontend && npm ci && npm run build",
  "cd backend && python -m venv /app/venv && /app/venv/bin/pip install -r requirements.txt"
]

[start]
cmd = "cd backend && /app/venv/bin/uvicorn main:app --host 0.0.0.0 --port $PORT"
